services:
  - type: web
    name: fast-finance-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fast-finance-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
  - type: web
    name: fast-finance-frontend
    runtime: static
    buildCommand: npm install -g bun && bun install && cd apps/frontend && bun run build
    staticPublishPath: apps/frontend/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
    buildFilter:
      paths:
        - apps/frontend/**
        - packages/shared/**

databases:
  - name: fast-finance-db
    plan: free
    databaseName: fast_finance

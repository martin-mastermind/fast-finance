name: Deploy

on:
  push:
    branches: [main]          # → staging
    tags: ['v*']              # → production

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ── Build & push Docker images ────────────────────────────────────────────
  build:
    name: Build images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging (every push to main) ───────────────────────────────
  deploy-staging:
    name: Deploy → staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    concurrency: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            export IMAGE_BACKEND="${{ env.IMAGE_BACKEND }}:${{ needs.build.outputs.tag }}"
            export IMAGE_FRONTEND="${{ env.IMAGE_FRONTEND }}:${{ needs.build.outputs.tag }}"
            cd /opt/fast-finance-staging
            # Pull new images
            docker pull "$IMAGE_BACKEND"
            docker pull "$IMAGE_FRONTEND"
            # Rolling restart — zero downtime via compose
            IMAGE_BACKEND="$IMAGE_BACKEND" IMAGE_FRONTEND="$IMAGE_FRONTEND" \
              docker compose -f docker-compose.staging.yml up -d --no-deps \
              --pull never backend frontend
            # Run DB migrations inside new container
            docker compose -f docker-compose.staging.yml exec -T backend \
              bun run /app/packages/db/src/run-migrations.ts
            # Health-check
            sleep 5
            curl -sf http://localhost:3001/health || (echo "Health check failed"; exit 1)
            echo "Staging deploy complete: $IMAGE_BACKEND"

  # ── Deploy to production (on version tag v*) ─────────────────────────────
  deploy-production:
    name: Deploy → production
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')
    concurrency: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            export IMAGE_BACKEND="${{ env.IMAGE_BACKEND }}:${{ needs.build.outputs.tag }}"
            export IMAGE_FRONTEND="${{ env.IMAGE_FRONTEND }}:${{ needs.build.outputs.tag }}"
            cd /opt/fast-finance
            # Record previous image tag for rollback
            PREV_BACKEND=$(docker inspect --format='{{index .Config.Image}}' fast-finance-backend 2>/dev/null || echo "none")
            echo "$PREV_BACKEND" > .last_backend_image
            # Deploy
            docker pull "$IMAGE_BACKEND"
            docker pull "$IMAGE_FRONTEND"
            IMAGE_BACKEND="$IMAGE_BACKEND" IMAGE_FRONTEND="$IMAGE_FRONTEND" \
              docker compose up -d --no-deps --pull never backend frontend
            docker compose exec -T backend bun run /app/packages/db/src/run-migrations.ts
            sleep 5
            curl -sf http://localhost:3001/health || (echo "Health check failed — rolling back"; \
              ROLLBACK=$(cat .last_backend_image); \
              IMAGE_BACKEND="$ROLLBACK" docker compose up -d --no-deps --pull never backend; \
              exit 1)
            echo "Production deploy complete: $IMAGE_BACKEND"

  # ── Manual rollback (workflow_dispatch) ──────────────────────────────────
  rollback:
    name: Rollback production
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch'
    concurrency: production

    steps:
      - name: Rollback to previous image via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/fast-finance
            PREV=$(cat .last_backend_image)
            if [ -z "$PREV" ] || [ "$PREV" = "none" ]; then
              echo "No previous image recorded — cannot rollback"; exit 1
            fi
            echo "Rolling back to $PREV"
            IMAGE_BACKEND="$PREV" docker compose up -d --no-deps --pull never backend
            sleep 5
            curl -sf http://localhost:3001/health
            echo "Rollback complete"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: production

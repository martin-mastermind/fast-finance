name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Security audit
        run: bun audit

      - name: Run database migrations
        run: cd packages/db && bun run run-migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fast_finance

      - name: Type-check backend
        run: cd apps/backend && bunx tsc --noEmit

      - name: Run backend tests
        run: cd apps/backend && bun test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fast_finance
          TELEGRAM_BOT_TOKEN: test_token
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fast_finance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

  test-frontend:
    name: Frontend — lint, type-check, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check frontend
        run: cd apps/frontend && bunx tsc --noEmit

      - name: Lint frontend
        run: cd apps/frontend && bun run lint

      - name: Run frontend tests
        run: cd apps/frontend && bun run test
        env:
          NODE_ENV: test

      - name: Build frontend
        run: cd apps/frontend && bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
